<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ODS en la UARM</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --navy:#1B3A5C; --navy-l:#2a5080; --gold:#C8A84B; --gold-l:#e8c96b;
  --bg:#F4F6FA; --card:#fff; --text:#1e2d3d; --muted:#6b7a8d; --border:#dde3ec;
  --green:#2ECC71; --red:#e53935; --radius:14px;
  --sh:0 4px 20px rgba(27,58,92,.10); --sh-lg:0 8px 40px rgba(27,58,92,.16);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* HEADER */
.hdr{background:var(--navy);color:#fff;padding:10px 20px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.hdr-left{display:flex;align-items:center}
.hdr-logo{font-size:20px;font-weight:800;letter-spacing:-.5px;text-align:center}
.hdr-logo span{color:var(--gold)}
.hdr-right{display:flex;align-items:center;justify-content:flex-end}
.hdr-img{height:52px;width:auto;object-fit:contain;display:block}
.hdr-img-right{height:48px;width:auto;object-fit:contain;display:block}

/* FOOTER */
.ftr{background:var(--navy);color:rgba(255,255,255,.65);text-align:center;padding:14px 20px;font-size:12px;line-height:1.5;margin-top:40px;border-top:1px solid rgba(255,255,255,.1)}

/* PROGRESS */
.prog-wrap{background:#fff;border-bottom:1px solid var(--border);padding:0 20px;overflow-x:auto}
.prog-steps{display:flex;max-width:760px;margin:0 auto;position:relative}
.prog-steps::before{content:'';position:absolute;top:22px;left:48px;right:48px;height:2px;background:var(--border);z-index:0}
.step-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:14px 4px;cursor:default;position:relative;z-index:1;min-width:70px}
.step-dot{width:28px;height:28px;border-radius:50%;background:#fff;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:var(--muted);transition:all .3s;margin-bottom:6px}
.step-item.active .step-dot{background:var(--navy);border-color:var(--navy);color:#fff;box-shadow:0 0 0 4px rgba(27,58,92,.12)}
.step-item.done .step-dot{background:var(--green);border-color:var(--green);color:#fff}
.step-label{font-size:10px;font-weight:700;color:var(--muted);text-align:center;text-transform:uppercase;letter-spacing:.5px}
.step-item.active .step-label{color:var(--navy)}
.step-item.done .step-label{color:var(--green)}

/* MAIN */
.main{max-width:840px;margin:0 auto;padding:28px 18px 90px}

/* CARD */
.card{background:var(--card);border-radius:var(--radius);padding:28px;box-shadow:var(--sh);border:1px solid var(--border);animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.card-title{font-size:22px;font-weight:800;color:var(--navy);margin-bottom:5px}
.card-sub{font-size:14px;color:var(--muted);margin-bottom:24px;line-height:1.6}

/* FORM */
.fg{margin-bottom:18px}
.fl{display:block;font-size:12px;font-weight:700;color:var(--navy);margin-bottom:7px;text-transform:uppercase;letter-spacing:.6px}
.fsel,.finp,.ftxt{width:100%;padding:11px 15px;border:2px solid var(--border);border-radius:10px;font-family:'Outfit',sans-serif;font-size:14px;color:var(--text);background:#fff;transition:border-color .2s,box-shadow .2s;appearance:none}
.fsel:focus,.finp:focus,.ftxt:focus{outline:none;border-color:var(--navy);box-shadow:0 0 0 3px rgba(27,58,92,.07)}
.fsel:disabled{background:#f5f7fa;color:var(--muted);cursor:not-allowed}
.fsel-wrap{position:relative}
.fsel-wrap::after{content:'▾';position:absolute;right:13px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;font-size:13px}
.ftxt{resize:vertical;min-height:90px}

/* INFO BOX */
.info-box{background:#f0f4f8;border-radius:10px;padding:14px 16px;margin-top:4px;display:flex;flex-wrap:wrap;gap:7px}
.tag{background:rgba(27,58,92,.08);color:var(--navy);padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600}

/* ODS GRID */
.ods-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px}
.ods-card{border-radius:11px;padding:14px;border:2px solid transparent;transition:all .2s}
.ods-card:hover{transform:translateY(-1px);box-shadow:var(--sh)}
.ods-head{display:flex;align-items:flex-start;gap:9px;margin-bottom:10px}
.ods-num{width:34px;height:34px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#fff;flex-shrink:0}
.ods-name{font-size:12px;font-weight:700;line-height:1.3;flex:1}
.ods-pilar{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;text-transform:uppercase;letter-spacing:.4px;margin-top:3px}
.ps{background:rgba(68,160,235,.13);color:#1a6fab}
.pa{background:rgba(78,160,56,.13);color:#2d6a1f}
.pe{background:rgba(240,150,40,.13);color:#8a4f00}

/* RATING */
.r-row{display:flex;align-items:center;gap:5px}
.r-dots{display:flex;gap:4px}
.rdot{width:24px;height:24px;border-radius:50%;border:2px solid #ddd;background:#fff;cursor:pointer;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;color:#bbb;transition:all .15s;flex-shrink:0;user-select:none}
.rdot:hover{transform:scale(1.18)}
.rdot.on{color:#fff;border-color:transparent}
.r-val{font-size:18px;font-weight:800;min-width:20px;text-align:center}

/* PAU */
.pau-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:560px){.pau-grid{grid-template-columns:1fr}}
.pau-card{border-radius:12px;padding:18px;background:#fff;border:2px solid var(--border);transition:all .2s}
.pau-icon{font-size:30px;margin-bottom:8px}
.pau-name{font-size:14px;font-weight:800;color:var(--navy);margin-bottom:3px;line-height:1.3}
.pau-desc{font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.5}

/* REVIEW */
.rev-sec{margin-bottom:18px}
.rev-title{font-size:12px;font-weight:800;color:var(--navy);text-transform:uppercase;letter-spacing:.6px;border-bottom:2px solid var(--border);padding-bottom:7px;margin-bottom:12px}
.rev-info{background:#f8f9fc;border-radius:9px;padding:14px;display:grid;grid-template-columns:1fr 1fr;gap:9px}
@media(max-width:500px){.rev-info{grid-template-columns:1fr}}
.rf-label{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.rf-val{font-size:13px;font-weight:700;color:var(--text);margin-top:2px}
.ods-rev-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:7px}
.ods-rev-item{border-radius:7px;padding:8px 10px;display:flex;align-items:center;gap:7px;font-size:12px;font-weight:600}
.ods-rev-badge{width:26px;height:26px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;color:#fff;flex-shrink:0}
.ods-rev-score{margin-left:auto;font-size:15px;font-weight:800}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:12px 24px;border-radius:9px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:700;cursor:pointer;border:none;transition:all .2s;text-decoration:none}
.btn-primary{background:var(--navy);color:#fff}
.btn-primary:hover:not(:disabled){background:var(--navy-l);transform:translateY(-1px);box-shadow:var(--sh)}
.btn-secondary{background:#fff;color:var(--navy);border:2px solid var(--border)}
.btn-secondary:hover:not(:disabled){border-color:var(--navy)}
.btn-success{background:var(--green);color:#fff}
.btn-success:hover:not(:disabled){background:#27ae60}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important}

/* NAV BAR */
.nav-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);padding:12px 20px;display:flex;justify-content:space-between;align-items:center;z-index:50;box-shadow:0 -4px 20px rgba(0,0,0,.07)}
.nav-right{display:flex;gap:8px;align-items:center}

/* HERO */
.hero{background:linear-gradient(135deg,var(--navy) 0%,#2a5080 100%);border-radius:14px;padding:36px;color:#fff;text-align:center;margin-bottom:24px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;background:rgba(200,168,75,.1);border-radius:50%}
.hero-title{font-size:26px;font-weight:800;margin-bottom:8px;line-height:1.2}
.hero-title span{color:var(--gold-l)}
.hero-sub{font-size:14px;opacity:.8;margin-bottom:20px;line-height:1.6}
.sdgs-row{display:flex;justify-content:center;gap:5px;flex-wrap:wrap}
.sdg-dot{width:26px;height:26px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff}

/* ALERTS */
.alert{padding:12px 16px;border-radius:9px;font-size:13px;margin-bottom:16px;border-left:4px solid;line-height:1.5}
.a-info{background:#e8f4fd;border-color:#2196F3;color:#0d47a1}
.a-warn{background:#fff8e1;border-color:#FF9800;color:#7a4800}
.a-success{background:#e8f8ee;border-color:var(--green);color:#1a6336}
.a-error{background:#fdeeee;border-color:var(--red);color:#7f0000}

/* SUCCESS */
.suc-screen{text-align:center;padding:16px 0}
.suc-icon{font-size:68px;margin-bottom:18px;animation:popIn .4s ease}
@keyframes popIn{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.suc-title{font-size:26px;font-weight:800;color:var(--navy);margin-bottom:8px}
.suc-sub{font-size:15px;color:var(--muted);margin-bottom:24px}

/* MISC */
.divider{height:1px;background:var(--border);margin:20px 0}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.chip{background:rgba(27,58,92,.07);color:var(--navy);border:1px solid rgba(27,58,92,.12);border-radius:20px;padding:5px 14px;font-size:12px;font-weight:700;display:inline-flex;align-items:center;gap:5px}
pre.code{background:#1e2d3d;color:#a8d8a8;border-radius:10px;padding:18px;font-size:11px;overflow-x:auto;line-height:1.7;white-space:pre-wrap;margin-top:10px}
</style>

const tc = s => s.toLowerCase().replace(/\b\w/g,l=>l.toUpperCase());
const rgba = (hex,a) => {const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`};

const S = {
  step:0, // 0=welcome,1=id,2=ods,3=pau,4=review,5=done
  fac:'', doc:null, curIdx:-1,
  ods: Object.fromEntries(ODS.map(o=>[o.id,0])),
  pau: Object.fromEntries(PAU.map(p=>[p.id,0])),
  comODS:'', comPAU:'',
  sending:false, result:null,
};
const STEPS=['Inicio','Identificación','ODS','PAU','Revisión'];

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════
function render(){
  document.getElementById('root').innerHTML = html();
  bind();
}

function html(){
  return hdr() + (S.step>0&&S.step<5?prog():'') + `<div class="main">${body()}</div>` + (S.step>0&&S.step<5?nav():'') + ftr();
}

function hdr(){
  return `<header class="hdr">
    <div class="hdr-left">
      <img class="hdr-img" src="https://obepe.org/wp-content/uploads/2026/03/LOGO-ASOCIADO-UARM-A-LA-CATEDRA-v-24-white-small.png" alt="UARM – Asociado a la Cátedra">
    </div>
    <div class="hdr-logo">ODS <span>en la</span> UARM</div>
    <div class="hdr-right">
      <img class="hdr-img-right" src="https://obepe.org/wp-content/uploads/2026/03/Logo-Catedra-UNESCO-blanco.png" alt="Cátedra UNESCO">
    </div>
  </header>`;
}

function ftr(){
  return `<footer class="ftr">Diseñado por <strong style="color:rgba(255,255,255,.85)">Ander Alonso-Pastor</strong>. <br> Coordinador de la Cátedra UNESCO en Políticas Educativas y Agenda 2030</footer>`;
}

function prog(){
  return `<div class="prog-wrap"><div class="prog-steps">
    ${STEPS.map((s,i)=>{
      const cls = S.step===i?'active':S.step>i?'done':'';
      return `<div class="step-item ${cls}"><div class="step-dot">${S.step>i?'✓':i}</div><div class="step-label">${s}</div></div>`;
    }).join('')}
  </div></div>`;
}

function nav(){
  const isLast = S.step===4;
  const canNext = S.step===1?(S.fac&&S.doc&&S.curIdx>=0):true;
  return `<div class="nav-bar">
    <button class="btn btn-secondary" id="btnBack">← Atrás</button>
    <button class="btn ${isLast?'btn-success':'btn-primary'}" id="btnNext" ${canNext?'':'disabled'}>
      ${isLast?(S.sending?'<span class="spinner"></span> Enviando…':'✓ Enviar mapeo'):'Siguiente →'}
    </button>
  </div>`;
}

function body(){
  switch(S.step){
    case 0: return welcome();
    case 1: return ident();
    case 2: return odsStep();
    case 3: return pausStep();
    case 4: return review();
    case 5: return done();
  }
}

      <label class="fl">Facultad / Departamento</label>
      <div class="fsel-wrap"><select class="fsel" id="selFac">
        <option value="">— Selecciona tu facultad —</option>
        ${Object.keys(DD).map(f=>`<option value="${f}" ${S.fac===f?'selected':''}>${f}</option>`).join('')}
      </select></div>
    </div>
    <div class="fg">
      <label class="fl">Docente</label>
      <div class="fsel-wrap"><select class="fsel" id="selDoc" ${!S.fac?'disabled':''}>
        <option value="">— Selecciona tu nombre —</option>
        ${docs.map((d,i)=>`<option value="${i}" ${S.doc&&S.doc.email===d.email?'selected':''}>${tc(d.n)}</option>`).join('')}
      </select></div>
    </div>
    ${S.doc?`<div class="fg"><label class="fl">Correo institucional</label><input class="finp" value="${S.doc.email}" readonly style="background:#f5f7fa;color:var(--muted)"></div>`:''}
    <div class="fg">
      <label class="fl">Curso y sección</label>
      <div class="fsel-wrap"><select class="fsel" id="selCur" ${!S.doc?'disabled':''}>
        <option value="-1">— Selecciona tu curso —</option>
        ${cursos.map((c,i)=>{
          const done = S.doc&&isDone(S.doc.email,c.cod);
          return `<option value="${i}" ${S.curIdx===i?'selected':''} ${done?'style="color:#e53935"':''}>
            ${c.curso} — Sección ${c.s}${done?' ✓ ya enviado':''}
          </option>`;
        }).join('')}
      </select></div>
    </div>
    ${cur?`<div class="info-box"><span class="tag">📚 ${cur.carr}</span><span class="tag">🔑 ${cur.cod}</span></div>`:''}
    ${blocked?`<div class="alert a-warn" style="margin-top:16px">⚠ Ya enviaste el mapeo para este curso en el período ${SEMESTRE}. Si necesitas corregirlo, contacta al administrador.</div>`:''}
  </div>`;
}

// ─── ODS ────────────────────────────────────
function odsStep(){
  const active = Object.values(S.ods).filter(v=>v>0).length;
  return `<div class="card">
    <div class="card-title">Mapeo de ODS</div>
    <div class="card-sub">Evalúa del <strong>1 al 5</strong> la relación de tu curso con cada ODS. <strong>0</strong> = ninguna relación · <strong>5</strong> = relación muy directa. Debes puntuar los 17 ODS (0 es válido).</div>
    <div class="chips">
      <span class="chip">🎯 ${active} ODS con puntuación > 0</span>
      <span class="chip">Suma total: ${Object.values(S.ods).reduce((a,b)=>a+b,0)}</span>
    </div>
    <div class="ods-grid">${ODS.map(odsCard).join('')}</div>
    <div style="margin-top:20px">
      <label class="fl">Comentario / Justificación (opcional)</label>
      <textarea class="ftxt" id="txtODS" placeholder="Explica brevemente cómo tu curso se relaciona con los ODS marcados...">${S.comODS}</textarea>
    </div>
  </div>`;
}

function odsCard(o){
  const sc=S.ods[o.id], bg=rgba(o.c,.06), bd=rgba(o.c,sc>0?.5:.15);
  return `<div class="ods-card" style="background:${bg};border-color:${bd}">
    <div class="ods-head">
      <img src="${o.img}" alt="${o.id}" style="width:36px;height:36px;border-radius:7px;object-fit:cover;flex-shrink:0">
      <div><div class="ods-name" style="color:${sc>0?o.c:'#2c3e50'}">${o.n}</div>
      <span class="ods-pilar ${pilarCls(o.p)}">${o.p}</span></div>
    </div>
    <div class="r-row">
      <div class="r-dots">
        ${[1,2,3,4,5].map(v=>`<div class="rdot${sc>=v?' on':''}" data-ods="${o.id}" data-v="${v}" style="${sc>=v?`background:${o.c}`:''}">${v}</div>`).join('')}
      </div>
      <div class="r-val" style="color:${sc>0?o.c:'#bbb'}">${sc}</div>
    </div>
  </div>`;
}

// ─── PAU ─────────────────────────────────────
function pausStep(){
  return `<div class="card">
    <div class="card-title">Mapeo de PAU</div>
    <div class="card-sub">Evalúa del <strong>1 al 5</strong> cómo tu curso contribuye a cada Prioridad Apostólica Universal. (Opcional)</div>
    <div class="pau-grid">${PAU.map(pauCard).join('')}</div>
    <div style="margin-top:20px">
      <label class="fl">Comentario / Justificación (opcional)</label>
      <textarea class="ftxt" id="txtPAU" placeholder="Explica cómo tu curso se vincula a las PAU...">${S.comPAU}</textarea>
    </div>
  </div>`;
}

function pauCard(p){
  const sc=S.pau[p.id];
  return `<div class="pau-card" style="border-color:${sc>0?p.color:'var(--border)'}">
    <div class="pau-icon">${p.icon}</div>
    <div class="pau-name">${p.n}</div>
    <div class="pau-desc">${p.desc}</div>
    <div class="r-row">
      <div class="r-dots">
        ${[1,2,3,4,5].map(v=>`<div class="rdot${sc>=v?' on':''}" data-pau="${p.id}" data-v="${v}" style="${sc>=v?`background:${p.color}`:''}">${v}</div>`).join('')}
      </div>
      <div class="r-val" style="color:${sc>0?p.color:'#bbb'}">${sc}</div>
    </div>
  </div>`;
}

// ─── REVIEW ───────────────────────────────────
function review(){
  const c=S.doc.c[S.curIdx];

  // Top 3 ODS
  const top3 = [...ODS].sort((a,b)=>S.ods[b.id]-S.ods[a.id]).slice(0,3).filter(o=>S.ods[o.id]>0);

  // Pillar scores
  const pilares = {Social:0, Ambiental:0, Economía:0};
  const pilarCount = {Social:0, Ambiental:0, Economía:0};
  ODS.forEach(o=>{ if(S.ods[o.id]>0){ pilares[o.p]=Math.max(pilares[o.p],S.ods[o.id]); pilarCount[o.p]++; }});

  setTimeout(()=>initCharts(), 50);

  return `<div class="card">
    <div class="card-title">Revisión final</div>
    <div class="card-sub">Revisa tus resultados antes de enviar. Puedes volver atrás para hacer cambios.</div>

    <div class="rev-sec">
      <div class="rev-title">👤 Identificación</div>
      <div class="rev-info">
        <div><div class="rf-label">Docente</div><div class="rf-val">${tc(S.doc.n)}</div></div>
        <div><div class="rf-label">Correo</div><div class="rf-val">${S.doc.email}</div></div>
        <div><div class="rf-label">Facultad</div><div class="rf-val">${S.fac}</div></div>
        <div><div class="rf-label">Curso</div><div class="rf-val">${c.curso} §${c.s}</div></div>
        <div><div class="rf-label">Carrera</div><div class="rf-val">${c.carr}</div></div>
        <div><div class="rf-label">Código</div><div class="rf-val">${c.cod}</div></div>
      </div>
    </div>

    ${top3.length ? `
    <div class="rev-sec">
      <div class="rev-title">🏆 Top ODS de tu curso</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        ${top3.map((o,i)=>`
          <div style="flex:1;min-width:140px;background:${rgba(o.c,.08)};border:2px solid ${o.c};border-radius:12px;padding:16px;text-align:center">
            <div style="font-size:11px;font-weight:800;color:${o.c};text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">#${i+1}</div>
            <img src="${o.img}" alt="ODS ${o.id}" style="width:52px;height:52px;border-radius:8px;object-fit:cover;margin:0 auto 8px;display:block" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
          <div style="width:44px;height:44px;background:${o.c};border-radius:10px;align-items:center;justify-content:center;font-weight:800;font-size:16px;color:white;margin:0 auto 8px;display:none">${o.id}</div>
            <div style="font-size:12px;font-weight:700;color:#2c3e50;line-height:1.3;margin-bottom:8px">${o.n}</div>
            <div style="font-size:28px;font-weight:800;color:${o.c}">${S.ods[o.id]}</div>
            <div style="font-size:10px;color:var(--muted)">de 5</div>
          </div>
        `).join('')}
      </div>
    </div>` : ''}

    <div class="rev-sec">
      <div class="rev-title">🌐 Radar ODS</div>
      <div style="max-width:420px;margin:0 auto">
        <canvas id="chartRadar" height="380"></canvas>
      </div>
    </div>

    <div class="rev-sec">
      <div class="rev-title">📊 ODS por Pilar</div>
      <div style="max-width:500px;margin:0 auto">
        <canvas id="chartPilar" height="180"></canvas>
      </div>
    </div>

    <div class="rev-sec">
      <div class="rev-title">✨ Prioridades Apostólicas (PAU)</div>
      <div style="max-width:500px;margin:0 auto">
        <canvas id="chartPAU" height="180"></canvas>
      </div>
      ${S.comPAU?`<div style="margin-top:10px;font-size:12px;color:var(--muted);background:#f8f9fc;padding:10px;border-radius:7px;font-style:italic">"${S.comPAU}"</div>`:''}
    </div>

    <div class="rev-sec">
      <div class="rev-title">🌐 Detalle ODS</div>
      <div class="ods-rev-grid">
        ${ODS.map(o=>{const sc=S.ods[o.id],bg=sc>0?rgba(o.c,.1):'#f5f7fa';return`<div class="ods-rev-item" style="background:${bg}"><img src="${o.img}" alt="${o.id}" style="width:26px;height:26px;border-radius:4px;object-fit:cover;flex-shrink:0" onerror="this.outerHTML='<div class=\'ods-rev-badge\' style=\'background:${o.c}\'>${o.id}</div>'"><span style="font-size:11px;color:${sc>0?'#2c3e50':'#9aa5b4'};flex:1">${o.n}</span><span class="ods-rev-score" style="color:${sc>0?o.c:'#ccc'}">${sc}</span></div>`;}).join('')}
      </div>
      ${S.comODS?`<div style="margin-top:10px;font-size:12px;color:var(--muted);background:#f8f9fc;padding:10px;border-radius:7px;font-style:italic">"${S.comODS}"</div>`:''}
    </div>
  </div>`;
}

function initCharts(){
  ['chartRadar','chartPilar','chartPAU'].forEach(id=>{
    const el = document.getElementById(id);
    if(el && el._chart) { el._chart.destroy(); }
  });

  // ── RADAR — only scored ODS ──
  const radarEl = document.getElementById('chartRadar');
  if(radarEl){
    const activeODS = ODS.filter(o=>S.ods[o.id]>0);
    radarEl._chart = new Chart(radarEl, {
      type: 'radar',
      data: {
        labels: activeODS.map(o => o.id + '. ' + (o.n.length>22 ? o.n.slice(0,22)+'…' : o.n)),
        datasets: [{
          label: 'Puntuación',
          data: activeODS.map(o => S.ods[o.id]),
          backgroundColor: 'rgba(27,58,92,0.15)',
          borderColor: '#1B3A5C',
          borderWidth: 2,
          pointBackgroundColor: activeODS.map(o => o.c),
          pointRadius: 6,
        }]
      },
      options: {
        responsive:true, maintainAspectRatio:false,
        scales:{ r:{ min:0, max:5, ticks:{stepSize:1,font:{size:10},backdropColor:'transparent'}, pointLabels:{font:{size:10}}}},
        plugins:{ legend:{display:false}}
      }
    });
  }

  // ── PILARES — average of scored ODS ──
  const pilarEl = document.getElementById('chartPilar');
  if(pilarEl){
    const pilarData = [
      {label:'Sociedad',  color:'#1a6fab', ids: ODS.filter(o=>o.p==='Sociedad').map(o=>o.id)},
      {label:'Biosfera',  color:'#2d6a1f', ids: ODS.filter(o=>o.p==='Biosfera').map(o=>o.id)},
      {label:'Economía',  color:'#8a4f00', ids: ODS.filter(o=>o.p==='Economía').map(o=>o.id)},
    ];
    const avg = ids => {
      const scored = ids.map(id=>S.ods[id]).filter(v=>v>0);
      return scored.length ? parseFloat((scored.reduce((a,b)=>a+b,0)/scored.length).toFixed(2)) : 0;
    };
    pilarEl._chart = new Chart(pilarEl, {
      type: 'bar',
      data: {
        labels: pilarData.map(p=>p.label),
        datasets: [{
          label: 'Promedio',
          data: pilarData.map(p=>avg(p.ids)),
          backgroundColor: pilarData.map(p=>p.color+'55'),
          borderColor: pilarData.map(p=>p.color),
          borderWidth: 2, borderRadius: 8,
        }]
      },
      options: {
        responsive:true, maintainAspectRatio:false,
        scales:{ y:{min:0,max:5,ticks:{stepSize:1}} },
        plugins:{ legend:{display:false},
          tooltip:{ callbacks:{ label: ctx => ' Promedio: '+ctx.raw.toFixed(2) }}}
      }
    });
  }

  // ── PAU ──
  const pauEl = document.getElementById('chartPAU');
  if(pauEl){
    pauEl._chart = new Chart(pauEl, {
      type: 'bar',
      data: {
        labels: PAU.map(p => p.icon+' '+(p.n.length>28?p.n.slice(0,28)+'…':p.n)),
        datasets: [{
          label: 'Puntuación',
          data: PAU.map(p=>S.pau[p.id]),
          backgroundColor: PAU.map(p=>p.color+'55'),
          borderColor: PAU.map(p=>p.color),
          borderWidth: 2, borderRadius: 8,
        }]
      },
      options: {
        indexAxis:'y', responsive:true, maintainAspectRatio:false,
        scales:{ x:{min:0,max:5,ticks:{stepSize:1}} },
        plugins:{ legend:{display:false}}
      }
    });
  }
}

// ─── DONE ─────────────────────────────────────
function done(){
  const c=S.doc.c[S.curIdx];
  const top=ODS.filter(o=>S.ods[o.id]>=4).slice(0,3);
  return `<div class="card">
    <div class="suc-screen">
      <div class="suc-icon">✅</div>
      <div class="suc-title">¡Mapeo completado!</div>
      <div class="suc-sub">Tu mapeo del curso <strong>${c.curso}</strong> ha sido guardado correctamente.</div>
      ${top.length?`<div style="margin:16px 0 24px"><div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">ODS principales de tu curso</div><div style="display:flex;justify-content:center;gap:8px;flex-wrap:wrap">${top.map(o=>`<div style="background:${o.c};color:#fff;border-radius:8px;padding:7px 14px;font-weight:700;font-size:12px">ODS ${o.id}: ${o.n}</div>`).join('')}</div></div>`:''}
      <button class="btn btn-primary" id="btnNew">+ Mapear otro curso</button>
      <a href="dashboard.html" class="btn btn-secondary" style="margin-top:10px">Ver dashboard de resultados →</a>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════
// PAYLOAD & CSV
// ═══════════════════════════════════════════
function payload(){
  const c=S.doc.c[S.curIdx];
  return {
    registroClave:`${SEMESTRE}|${c.cod}|${S.doc.email}`,
    semestre:SEMESTRE, docente:S.doc.n, correo:S.doc.email,
    facultad:S.fac, curso:c.curso, seccion:c.s, codigoRamo:c.cod, carrera:c.carr,
    comentarioODS:S.comODS, comentarioPAU:S.comPAU,
    ods:ODS.map(o=>({ods_id:o.id,ods_nombre:o.n,pilar:o.p,puntaje:S.ods[o.id]})),
    pau:PAU.map(p=>({pau_id:p.id,pau_nombre:p.n,puntaje:S.pau[p.id]})),
  };
}



async function submit(){
  const d = payload();
  S.sending = true; render();

  try {
    await sendViaForm(d);
  } catch(e) {
    // no-cors always resolves, real errors are network failures
  }

  markDone(S.doc.email, S.doc.c[S.curIdx].cod);
  S.sending = false; S.step = 5; render();
}

function sendViaForm(d) {
  const fields = new URLSearchParams({
    [FORM_ENTRIES.RegistroClave]: d.registroClave,
    [FORM_ENTRIES.Semestre]:      d.semestre,
    [FORM_ENTRIES.Docente]:       d.docente,
    [FORM_ENTRIES.Correo]:        d.correo,
    [FORM_ENTRIES.Facultad]:      d.facultad,
    [FORM_ENTRIES.Curso]:         d.curso,
    [FORM_ENTRIES.Seccion]:       d.seccion,
    [FORM_ENTRIES.CodigoRamo]:    d.codigoRamo,
    [FORM_ENTRIES.Carrera]:       d.carrera,
    [FORM_ENTRIES.ODS_01]:        d.ods[0].puntaje,
    [FORM_ENTRIES.ODS_02]:        d.ods[1].puntaje,
    [FORM_ENTRIES.ODS_03]:        d.ods[2].puntaje,
    [FORM_ENTRIES.ODS_04]:        d.ods[3].puntaje,
    [FORM_ENTRIES.ODS_05]:        d.ods[4].puntaje,
    [FORM_ENTRIES.ODS_06]:        d.ods[5].puntaje,
    [FORM_ENTRIES.ODS_07]:        d.ods[6].puntaje,
    [FORM_ENTRIES.ODS_08]:        d.ods[7].puntaje,
    [FORM_ENTRIES.ODS_09]:        d.ods[8].puntaje,
    [FORM_ENTRIES.ODS_10]:        d.ods[9].puntaje,
    [FORM_ENTRIES.ODS_11]:        d.ods[10].puntaje,
    [FORM_ENTRIES.ODS_12]:        d.ods[11].puntaje,
    [FORM_ENTRIES.ODS_13]:        d.ods[12].puntaje,
    [FORM_ENTRIES.ODS_14]:        d.ods[13].puntaje,
    [FORM_ENTRIES.ODS_15]:        d.ods[14].puntaje,
    [FORM_ENTRIES.ODS_16]:        d.ods[15].puntaje,
    [FORM_ENTRIES.ODS_17]:        d.ods[16].puntaje,
    [FORM_ENTRIES.PAU_01]:        d.pau[0].puntaje,
    [FORM_ENTRIES.PAU_02]:        d.pau[1].puntaje,
    [FORM_ENTRIES.PAU_03]:        d.pau[2].puntaje,
    [FORM_ENTRIES.PAU_04]:        d.pau[3].puntaje,
    [FORM_ENTRIES.ComentarioODS]: d.comentarioODS,
    [FORM_ENTRIES.ComentarioPAU]: d.comentarioPAU,
    [FORM_ENTRIES.FechaEnvio]:    new Date().toISOString(),

  });
  return fetch(FORM_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
    body: fields,
  });
}

// ═══════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════
function bind(){
  q('#btnStart',el=>el.onclick=()=>{S.step=1;render();scroll()});

  q('#selFac',el=>el.onchange=()=>{S.fac=el.value;S.doc=null;S.curIdx=-1;render()});
  q('#selDoc',el=>el.onchange=()=>{
    const i=parseInt(el.value);
    S.doc=isNaN(i)?null:(DD[S.fac]||[])[i]||null;
    S.curIdx=-1;render();
  });
  q('#selCur',el=>el.onchange=()=>{S.curIdx=parseInt(el.value);render()});

  document.querySelectorAll('.rdot[data-ods]').forEach(d=>{
    d.onmousedown=()=>{window._sy=scrollY};
    d.onclick=()=>{
      const id=+d.dataset.ods,v=+d.dataset.v;
      S.ods[id]=S.ods[id]===v?0:v;
      render(); scrollTo(0,window._sy||0);
    };
  });
  document.querySelectorAll('.rdot[data-pau]').forEach(d=>{
    d.onmousedown=()=>{window._sy=scrollY};
    d.onclick=()=>{
      const id=+d.dataset.pau,v=+d.dataset.v;
      S.pau[id]=S.pau[id]===v?0:v;
      render(); scrollTo(0,window._sy||0);
    };
  });

  q('#txtODS',el=>el.oninput=()=>S.comODS=el.value);
  q('#txtPAU',el=>el.oninput=()=>S.comPAU=el.value);

  q('#btnBack',el=>el.onclick=()=>{if(S.step>0){S.step--;render();scroll()}});
  q('#btnNext',el=>el.onclick=()=>{
    if(S.step===4){submit()}
    else{
      // Block if duplicate at step 1 (except admin)
      const isAdmin = S.doc&&S.doc.email==='ander.alonso@uarm.pe';
      if(S.step===1&&S.doc&&S.curIdx>=0&&!isAdmin&&isDone(S.doc.email,S.doc.c[S.curIdx].cod)) return;
      S.step++;render();scroll();
    }
  });


  q('#btnNew',el=>el.onclick=()=>{
    Object.assign(S,{step:1,fac:'',doc:null,curIdx:-1,
      ods:Object.fromEntries(ODS.map(o=>[o.id,0])),
      pau:Object.fromEntries(PAU.map(p=>[p.id,0])),
      comODS:'',comPAU:'',result:null});
    render();scroll();
  });

}

function q(sel,cb){const el=document.querySelector(sel);if(el)cb(el)}
function scroll(){scrollTo(0,0)}

render();
</script>
</body>
</html>
