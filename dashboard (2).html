<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard ODS – UARM</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
:root {
  --navy:#1B3A5C; --navy-l:#2a5080; --gold:#C8A84B; --gold-l:#e8c96b;
  --bg:#EEF1F7; --card:#fff; --text:#1e2d3d; --muted:#7a8899; --border:#e2e8f0;
  --green:#27ae60; --red:#e53935; --radius:16px;
  --sh:0 2px 10px rgba(27,58,92,.07);
  --sh-md:0 6px 24px rgba(27,58,92,.11);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text)}

/* ── HEADER ─────────────────────────────── */
.hdr{background:var(--navy);padding:10px 28px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.22)}
.hdr-logo{font-size:18px;font-weight:800;color:#fff;text-align:center;letter-spacing:-.3px}
.hdr-logo span{color:var(--gold)}
.hdr-img{height:50px;width:auto;object-fit:contain;display:block}
.hdr-img-right{height:46px;width:auto;object-fit:contain;display:block;margin-left:auto}

/* ── FILTER BAR ─────────────────────────── */
.filter-bar{background:#fff;border-bottom:1px solid var(--border);padding:10px 28px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:sticky;top:71px;z-index:90;box-shadow:0 2px 6px rgba(0,0,0,.04)}
.filter-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.filter-chips{display:flex;gap:6px;flex-wrap:wrap;flex:1}
.fchip{padding:5px 14px;border-radius:20px;border:2px solid var(--border);background:#fff;color:var(--muted);font-family:'Outfit',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .18s;white-space:nowrap}
.fchip:hover{border-color:var(--navy);color:var(--navy)}
.fchip.active{background:var(--navy);border-color:var(--navy);color:#fff}
.filter-right{display:flex;align-items:center;gap:10px;margin-left:auto}
.last-upd{font-size:11px;color:var(--muted)}
.btn-refresh{padding:6px 13px;background:transparent;border:2px solid var(--border);border-radius:8px;color:var(--muted);font-family:'Outfit',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .18s}
.btn-refresh:hover{border-color:var(--navy);color:var(--navy)}

/* ── MAIN ───────────────────────────────── */
.main{max-width:1140px;margin:0 auto;padding:28px 24px 56px;width:100%}

/* ── STATES ─────────────────────────────── */
.state-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;text-align:center;gap:16px}
.state-title{font-size:20px;font-weight:800;color:var(--navy)}
.state-sub{font-size:14px;color:var(--muted);max-width:460px;line-height:1.65}
.spinner-lg{width:48px;height:48px;border:4px solid var(--border);border-top-color:var(--navy);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.btn-retry{padding:10px 24px;background:var(--navy);color:#fff;border:none;border-radius:10px;font-family:'Outfit',sans-serif;font-weight:700;font-size:14px;cursor:pointer}
.btn-retry:hover{background:var(--navy-l)}

/* ── KPI ROW ────────────────────────────── */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
@media(max-width:860px){.kpi-row{grid-template-columns:repeat(2,1fr)}}
@media(max-width:480px){.kpi-row{grid-template-columns:1fr}}
.kpi{background:var(--card);border-radius:var(--radius);padding:24px 26px 20px;box-shadow:var(--sh);border:1px solid var(--border);position:relative;overflow:hidden;animation:fadeUp .4s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.kpi:nth-child(2){animation-delay:.06s}.kpi:nth-child(3){animation-delay:.12s}.kpi:nth-child(4){animation-delay:.18s}
.kpi-accent{position:absolute;top:0;left:0;right:0;height:4px;border-radius:var(--radius) var(--radius) 0 0}
.kpi-label{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px}
.kpi-val{font-size:40px;font-weight:800;line-height:1;color:var(--navy);margin-bottom:5px}
.kpi-sub{font-size:12px;color:var(--muted);font-weight:500}
.kpi-ods-val{font-size:32px;font-weight:800;line-height:1;margin-bottom:5px}

/* ── INSIGHTS ───────────────────────────── */
.insights-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
@media(max-width:720px){.insights-row{grid-template-columns:1fr}}
.insight{background:var(--card);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--sh);border:1px solid var(--border);display:flex;align-items:center;gap:14px;animation:fadeUp .4s ease both}
.insight:nth-child(2){animation-delay:.07s}.insight:nth-child(3){animation-delay:.14s}
.insight-icon{font-size:26px;flex-shrink:0}
.insight-text{flex:1}
.insight-title{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.insight-val{font-size:14px;font-weight:700;color:var(--text);line-height:1.4}

/* ── COVERAGE BAR ───────────────────────── */
.coverage-card{background:var(--card);border-radius:var(--radius);padding:20px 24px;box-shadow:var(--sh);border:1px solid var(--border);margin-bottom:24px;animation:fadeUp .4s ease both}
.coverage-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.coverage-title{font-size:12px;font-weight:800;color:var(--navy);text-transform:uppercase;letter-spacing:.6px}
.coverage-pct{font-size:22px;font-weight:800;color:var(--navy)}
.coverage-track{height:10px;background:var(--border);border-radius:10px;overflow:hidden;margin-bottom:6px}
.coverage-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--green),#52d68a);transition:width .8s ease}
.coverage-sub{font-size:11px;color:var(--muted)}

/* ── GRID LAYOUTS ───────────────────────── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
@media(max-width:740px){.grid-2{grid-template-columns:1fr}}
.grid-3{display:grid;grid-template-columns:3fr 2fr;gap:20px;margin-bottom:20px}
@media(max-width:740px){.grid-3{grid-template-columns:1fr}}

/* ── CARD ───────────────────────────────── */
.card{background:var(--card);border-radius:var(--radius);padding:24px;box-shadow:var(--sh);border:1px solid var(--border);animation:fadeUp .4s ease both}
.card-full{margin-bottom:20px}
.card-title{font-size:12px;font-weight:800;color:var(--navy);text-transform:uppercase;letter-spacing:.7px;margin-bottom:18px;display:flex;align-items:center;gap:7px}
.card-title-line{flex:1;height:1px;background:var(--border)}

/* ── RANKING ────────────────────────────── */
.rank-list{display:flex;flex-direction:column;gap:5px;max-height:420px;overflow-y:auto;padding-right:2px}
.rank-list::-webkit-scrollbar{width:3px}
.rank-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.rank-item{display:flex;align-items:center;gap:11px;padding:8px 10px;border-radius:10px;transition:background .16s;cursor:default}
.rank-item:hover{background:#f4f7fb}
.rank-pos{font-size:11px;font-weight:800;color:var(--muted);min-width:16px;text-align:right}
.rank-img{width:30px;height:30px;border-radius:6px;object-fit:cover;flex-shrink:0}
.rank-info{flex:1;min-width:0}
.rank-name{font-size:12px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-pilar{display:inline-block;font-size:9px;font-weight:800;padding:1px 6px;border-radius:8px;text-transform:uppercase;margin-top:2px}
.rank-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.rank-score{font-size:16px;font-weight:800}
.rank-bar-wrap{width:100px;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.rank-bar{height:100%;border-radius:3px;transition:width .7s ease}

/* ── HEATMAP ────────────────────────────── */
.heatmap-wrap{overflow-x:auto}
.heatmap{border-collapse:collapse;width:100%}
.heatmap th{padding:6px 3px;text-align:center;font-weight:700;color:var(--muted);font-size:10px;border-bottom:2px solid var(--border);background:#fff;white-space:nowrap}
.heatmap th:first-child{text-align:left;padding-left:6px;min-width:160px}
.heatmap td{padding:3px;border-bottom:1px solid #f0f3f8;vertical-align:middle}
.heatmap td:first-child{font-size:11px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px;padding:6px 12px 6px 6px}
.hm-cell{width:40px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;margin:0 auto;cursor:default;transition:transform .12s}
.hm-cell:hover{transform:scale(1.18);z-index:5;position:relative}
.hm-0{background:#f4f7fb;color:#c5cdd8}

/* ── FOOTER ─────────────────────────────── */
.ftr{background:var(--navy);color:rgba(255,255,255,.6);text-align:center;padding:16px 24px;font-size:12px;line-height:1.6;border-top:1px solid rgba(255,255,255,.08)}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <div><img class="hdr-img" src="https://obepe.org/wp-content/uploads/2026/03/LOGO-ASOCIADO-UARM-A-LA-CATEDRA-v-24-white-small.png" alt="UARM"></div>
  <div class="hdr-logo">Dashboard <span>ODS</span> UARM</div>
  <div><img class="hdr-img-right" src="https://obepe.org/wp-content/uploads/2026/03/Logo-Catedra-UNESCO-blanco.png" alt="Cátedra UNESCO"></div>
</header>

<!-- FILTER BAR -->
<div class="filter-bar" id="filterBar" style="display:none">
  <span class="filter-label">🏛 Facultad</span>
  <div class="filter-chips" id="filterChips"></div>
  <div class="filter-right">
    <span class="last-upd" id="lastUpd"></span>
    <button class="btn-refresh" onclick="loadData()">↺ Actualizar</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="state-screen" id="stateScreen">
    <div class="spinner-lg"></div>
    <div class="state-title">Cargando datos…</div>
    <div class="state-sub">Leyendo el Google Sheet de mapeos ODS.</div>
  </div>
  <div id="dashContent" style="display:none"></div>
</div>

<!-- FOOTER -->
<footer class="ftr">
  Diseñado por <strong style="color:rgba(255,255,255,.88)">Ander Alonso-Pastor</strong>.<br>
  Coordinador de la Cátedra UNESCO en Políticas Educativas y Agenda 2030
</footer>

<script>
// ═══════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════
const SHEET_ID  = '1b6ZGFfLkadUoTEhL7RBxRyfsSYR0Fb5IdUAykMCa8uA';
const SHEET_GID = '0';
const CSV_URL   = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${SHEET_GID}`;

// ═══════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════
const ODS = [
  {id:1,  n:'Fin de la pobreza',                        p:'Sociedad', c:'#E5243B', img:'https://obepe.org/wp-content/uploads/2026/03/S_SDG-goals_icons-individual-rgb-01.png'},
  {id:2,  n:'Hambre cero',                              p:'Sociedad', c:'#DDA63A', img:'https://obepe.org/wp-content/uploads/2026/03/S_SDG-goals_icons-individual-rgb-02.png'},
  {id:3,  n:'Salud y bienestar',                        p:'Sociedad', c:'#4C9F38', img:'https://obepe.org/wp-content/uploads/2026/03/S_SDG-goals_icons-individual-rgb-03.png'},
  {id:4,  n:'Educación de calidad',                     p:'Sociedad', c:'#C5192D', img:'https://obepe.org/wp-content/uploads/2026/03/S_SDG-goals_icons-individual-rgb-04.png'},
  {id:5,  n:'Igualdad de género',                       p:'Sociedad', c:'#FF3A21', img:'https://obepe.org/wp-content/uploads/2026/03/S_SDG-goals_icons-individual-rgb-05.png'},
  {id:6,  n:'Agua limpia y saneamiento',                p:'Biosfera', c:'#26BDE2', img:'https://obepe.org/wp-content/uploads/2026/03/S_SDG-goals_icons-individual-rgb-06.png'},
  {id:7,  n:'Energía asequible y no contaminante',      p:'Sociedad', c:'#FCC30B', img:'https://obepe.org/wp-content/uploads/2026/03/S_SDG-goals_icons-individual-rgb-07.png'},
  {id:8,  n:'Trabajo decente y crecimiento económico',  p:'Economía', c:'#A21942', img:'https://obepe.org/wp-content/uploads/2026/03/S_SDG-goals_icons-individual-rgb-08.png'},
  {id:9,  n:'Industria, innovación e infraestructura',  p:'Economía', c:'#FD6925', img:'https://obepe.org/wp-content/uploads/2026/03/S_SDG-goals_icons-individual-rgb-09.png'},
  {id:10, n:'Reducción de las desigualdades',           p:'Economía', c:'#DD1367', img:'https://obepe.org/wp-content/uploads/2026/03/S_SDG-goals_icons-individual-rgb-10.png'},
  {id:11, n:'Ciudades y comunidades sostenibles',       p:'Sociedad', c:'#FD9D24', img:'https://obepe.org/wp-content/uploads/2026/03/S_SDG-goals_icons-individual-rgb-11.png'},
  {id:12, n:'Producción y consumo responsables',        p:'Economía', c:'#BF8B2E', img:'https://obepe.org/wp-content/uploads/2026/03/S_SDG-goals_icons-individual-rgb-12.png'},
  {id:13, n:'Acción por el clima',                      p:'Biosfera', c:'#3F7E44', img:'https://obepe.org/wp-content/uploads/2026/03/S_SDG-goals_icons-individual-rgb-13.png'},
  {id:14, n:'Vida submarina',                           p:'Biosfera', c:'#0A97D9', img:'https://obepe.org/wp-content/uploads/2026/03/S_SDG-goals_icons-individual-rgb-14.png'},
  {id:15, n:'Vida de ecosistemas terrestres',           p:'Biosfera', c:'#56C02B', img:'https://obepe.org/wp-content/uploads/2026/03/S_SDG-goals_icons-individual-rgb-15.png'},
  {id:16, n:'Paz, justicia e instituciones sólidas',    p:'Sociedad', c:'#00689D', img:'https://obepe.org/wp-content/uploads/2026/03/S_SDG-goals_icons-individual-rgb-16.png'},
  {id:17, n:'Alianzas para lograr los objetivos',       p:'Economía', c:'#19486A', img:'https://obepe.org/wp-content/uploads/2026/03/S_SDG-goals_icons-individual-rgb-17.png'},
];
const PAU = [
  {id:1, n:'Mostrar el camino hacia Dios',      icon:'✨', color:'#7B3F00'},
  {id:2, n:'Caminar con los excluidos',          icon:'🤝', color:'#1a3c5e'},
  {id:3, n:'Acompañar a los jóvenes en camino', icon:'🌱', color:'#2d6a1f'},
  {id:4, n:'Cuidar de nuestra casa común',       icon:'🌍', color:'#0a5c8c'},
];
const PILARES = [
  {label:'Sociedad', color:'#1a6fab', ids:ODS.filter(o=>o.p==='Sociedad').map(o=>o.id)},
  {label:'Biosfera', color:'#2d6a1f', ids:ODS.filter(o=>o.p==='Biosfera').map(o=>o.id)},
  {label:'Economía', color:'#8a4f00', ids:ODS.filter(o=>o.p==='Economía').map(o=>o.id)},
];

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let allRows=[], cols={}, filterFac='', charts={};

// ═══════════════════════════════════════════
// COLUMN DETECTION
// ═══════════════════════════════════════════
function detectCols(fields){
  const c={ods:{},pau:{}};
  fields.forEach(f=>{
    const fl=f.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    if(/facultad|departamento/.test(fl)) c.facultad=f;
    if(/docente|profesor/.test(fl))      c.docente=f;
    if(/correo|email/.test(fl))          c.correo=f;
    if(/curso|asignatura/.test(fl)&&!/carrera|cod/.test(fl)) c.curso=f;
    if(/semestre|periodo/.test(fl))      c.semestre=f;
    const om=f.match(/ODS[_\s\-\[]*0?(\d+)/i); if(om){const n=parseInt(om[1]);if(n>=1&&n<=17)c.ods[n]=f;}
    const pm=f.match(/PAU[_\s\-\[]*0?(\d+)/i); if(pm){const n=parseInt(pm[1]);if(n>=1&&n<=4)c.pau[n]=f;}
  });
  return c;
}
function colsOk(c){return c.facultad&&Object.keys(c.ods).length>=17&&Object.keys(c.pau).length>=4;}

// ═══════════════════════════════════════════
// LOAD
// ═══════════════════════════════════════════
function loadData(){
  showLoading();
  Papa.parse(CSV_URL,{
    download:true,header:true,skipEmptyLines:true,
    complete(res){
      if(!res.data||!res.data.length) return showError('El Sheet no tiene datos o no es accesible.<br><small>Asegúrate de que está compartido como "Cualquiera con el enlace puede ver".</small>');
      const d=detectCols(res.meta.fields||[]);
      if(!colsOk(d)) return showError('No se detectaron todas las columnas ODS/PAU.<br><small>Columnas encontradas: '+(res.meta.fields||[]).join(', ')+'</small>');
      cols=d; allRows=res.data; filterFac='';
      document.getElementById('lastUpd').textContent='Actualizado: '+new Date().toLocaleTimeString('es-PE',{hour:'2-digit',minute:'2-digit'});
      buildFilters(); renderDash();
    },
    error(e){showError('Error al leer el Sheet: '+e.message);}
  });
}

// ═══════════════════════════════════════════
// DATA HELPERS
// ═══════════════════════════════════════════
function rows(){return filterFac?allRows.filter(r=>(r[cols.facultad]||'').trim()===filterFac):allRows;}
function odsAvg(rws){
  const res={};
  ODS.forEach(o=>{
    const vs=rws.map(r=>parseFloat(r[cols.ods[o.id]]||0)).filter(v=>!isNaN(v)&&v>0);
    res[o.id]=vs.length?parseFloat((vs.reduce((a,b)=>a+b,0)/vs.length).toFixed(2)):0;
  });
  return res;
}
function pauAvg(rws){
  const res={};
  PAU.forEach(p=>{
    const vs=rws.map(r=>parseFloat(r[cols.pau[p.id]]||0)).filter(v=>!isNaN(v)&&v>0);
    res[p.id]=vs.length?parseFloat((vs.reduce((a,b)=>a+b,0)/vs.length).toFixed(2)):0;
  });
  return res;
}
function pilarAvg(rws){
  return PILARES.map(p=>{
    const vs=[];
    p.ids.forEach(id=>rws.forEach(r=>{const v=parseFloat(r[cols.ods[id]]||0);if(!isNaN(v)&&v>0)vs.push(v);}));
    return{...p,avg:vs.length?parseFloat((vs.reduce((a,b)=>a+b,0)/vs.length).toFixed(2)):0};
  });
}
function faculties(){return[...new Set(allRows.map(r=>(r[cols.facultad]||'').trim()).filter(Boolean))].sort();}
function uniqDocs(rws){return new Set(rws.map(r=>(r[cols.correo]||r[cols.docente]||'').trim()).filter(Boolean)).size;}
function hex2rgba(h,a){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}
function killChart(id){if(charts[id]){charts[id].destroy();delete charts[id];}}

// ═══════════════════════════════════════════
// FILTER BAR
// ═══════════════════════════════════════════
function buildFilters(){
  document.getElementById('filterBar').style.display='flex';
  document.getElementById('filterChips').innerHTML=
    chipBtn('Todas','',!filterFac)+faculties().map(f=>chipBtn(f,f,filterFac===f)).join('');
}
function chipBtn(l,v,a){return`<button class="fchip${a?' active':''}" onclick="setFilter(${JSON.stringify(v)})">${l}</button>`;}
function setFilter(f){filterFac=f;buildFilters();renderDash();}

// ═══════════════════════════════════════════
// INSIGHTS
// ═══════════════════════════════════════════
function buildInsights(avgs, rws){
  const sorted=ODS.slice().sort((a,b)=>avgs[b.id]-avgs[a.id]);
  const top=sorted[0], bottom=sorted[sorted.length-1];
  const covered=ODS.filter(o=>avgs[o.id]>0).length;

  // pilar más débil
  const pilarData=pilarAvg(rws);
  const weakPilar=pilarData.slice().sort((a,b)=>a.avg-b.avg)[0];

  return `
    <div class="insights-row">
      <div class="insight">
        <div class="insight-icon">🏆</div>
        <div class="insight-text">
          <div class="insight-title">ODS más trabajado</div>
          <div class="insight-val"><strong style="color:${top.c}">ODS ${top.id} — ${top.n}</strong><br>Promedio: ${avgs[top.id].toFixed(2)} / 5</div>
        </div>
      </div>
      <div class="insight">
        <div class="insight-icon">📉</div>
        <div class="insight-text">
          <div class="insight-title">ODS menos trabajado</div>
          <div class="insight-val"><strong style="color:${bottom.c}">ODS ${bottom.id} — ${bottom.n}</strong><br>Promedio: ${avgs[bottom.id].toFixed(2)} / 5</div>
        </div>
      </div>
      <div class="insight">
        <div class="insight-icon">⚠️</div>
        <div class="insight-text">
          <div class="insight-title">Pilar con menor cobertura</div>
          <div class="insight-val"><strong>${weakPilar.label}</strong> — promedio ${weakPilar.avg.toFixed(2)}<br>${covered} de 17 ODS con puntuación activa</div>
        </div>
      </div>
    </div>`;
}

// ═══════════════════════════════════════════
// COVERAGE BAR
// ═══════════════════════════════════════════
function buildCoverage(avgs){
  const covered=ODS.filter(o=>avgs[o.id]>0).length;
  const pct=Math.round((covered/17)*100);
  return `
    <div class="coverage-card">
      <div class="coverage-header">
        <span class="coverage-title">📊 Cobertura curricular de ODS</span>
        <span class="coverage-pct">${pct}%</span>
      </div>
      <div class="coverage-track"><div class="coverage-fill" style="width:${pct}%"></div></div>
      <div class="coverage-sub">${covered} de 17 ODS tienen al menos un curso que los trabaja · ${pct >= 80 ? '✅ Cobertura alta' : pct >= 50 ? '🟡 Cobertura media' : '🔴 Cobertura baja'}</div>
    </div>`;
}

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════
function renderDash(){
  const rws=rows(), avgs=odsAvg(rws), pavgs=pauAvg(rws);
  const sorted=ODS.slice().sort((a,b)=>avgs[b.id]-avgs[a.id]);
  const topODS=sorted[0];

  ['radar','pilares','pau','facComp'].forEach(killChart);

  const el=document.getElementById('dashContent');
  document.getElementById('stateScreen').style.display='none';
  el.style.display='block';

  const pilarColors=['#1a6fab','#2d6a1f','#8a4f00'];

  el.innerHTML=`
    <!-- KPIs -->
    <div class="kpi-row">
      <div class="kpi">
        <div class="kpi-accent" style="background:var(--navy)"></div>
        <div class="kpi-label">Mapeos enviados</div>
        <div class="kpi-val">${rws.length}</div>
        <div class="kpi-sub">${filterFac||'total acumulado'}</div>
      </div>
      <div class="kpi">
        <div class="kpi-accent" style="background:var(--green)"></div>
        <div class="kpi-label">Docentes participantes</div>
        <div class="kpi-val">${uniqDocs(rws)}</div>
        <div class="kpi-sub">con al menos un mapeo</div>
      </div>
      <div class="kpi">
        <div class="kpi-accent" style="background:var(--gold)"></div>
        <div class="kpi-label">Facultades</div>
        <div class="kpi-val">${filterFac?'1':faculties().length}</div>
        <div class="kpi-sub">${filterFac||'representadas'}</div>
      </div>
      <div class="kpi">
        <div class="kpi-accent" style="background:${topODS.c}"></div>
        <div class="kpi-label">ODS más puntuado</div>
        <div class="kpi-ods-val" style="color:${topODS.c}">ODS ${topODS.id}</div>
        <div class="kpi-sub">${topODS.n} · prom. ${avgs[topODS.id].toFixed(2)}</div>
      </div>
    </div>

    <!-- Cobertura -->
    ${buildCoverage(avgs)}

    <!-- Insights -->
    ${buildInsights(avgs, rws)}

    <!-- Radar + Ranking -->
    <div class="grid-2" style="margin-bottom:20px">
      <div class="card">
        <div class="card-title">🌐 Distribución de ODS <span class="card-title-line"></span></div>
        <div style="position:relative;height:340px"><canvas id="cRadar"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title">🏆 Ranking de ODS <span class="card-title-line"></span></div>
        <div class="rank-list" id="rankList"></div>
      </div>
    </div>

    <!-- Pilares + PAU -->
    <div class="grid-2" style="margin-bottom:20px">
      <div class="card">
        <div class="card-title">📐 Promedio por Pilar <span class="card-title-line"></span></div>
        <div style="position:relative;height:220px"><canvas id="cPilares"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title">✨ Prioridades Apostólicas <span class="card-title-line"></span></div>
        <div style="position:relative;height:220px"><canvas id="cPAU"></canvas></div>
      </div>
    </div>

    <!-- Heatmap -->
    ${!filterFac&&faculties().length>1?`
    <div class="card card-full">
      <div class="card-title">🔥 Mapa de calor — ODS × Facultad
        <span style="font-size:10px;font-weight:500;color:var(--muted);text-transform:none;letter-spacing:0;margin-left:6px">promedio de puntuaciones activas</span>
        <span class="card-title-line"></span>
      </div>
      <div class="heatmap-wrap"><table class="heatmap" id="hmTable"></table></div>
    </div>`:''}

    <!-- Comparativa facultad vs global -->
    ${filterFac?`
    <div class="card card-full">
      <div class="card-title">📊 ${filterFac} vs. Promedio global <span class="card-title-line"></span></div>
      <div style="position:relative;height:200px"><canvas id="cFacComp"></canvas></div>
    </div>`:''}
  `;

  initRadar(avgs); initRanking(avgs,sorted); initPilares(rws); initPAU(pavgs);
  if(!filterFac&&faculties().length>1) initHeatmap();
  if(filterFac) initFacComp(avgs);
}

// ═══════════════════════════════════════════
// CHARTS
// ═══════════════════════════════════════════
function initRadar(avgs){
  const scored=ODS.filter(o=>avgs[o.id]>0);
  if(scored.length<3) return;
  charts.radar=new Chart(document.getElementById('cRadar'),{
    type:'radar',
    data:{
      labels:scored.map(o=>o.id+'. '+(o.n.length>20?o.n.slice(0,20)+'…':o.n)),
      datasets:[{
        data:scored.map(o=>avgs[o.id]),
        backgroundColor:'rgba(27,58,92,0.10)',
        borderColor:'#1B3A5C',borderWidth:2,
        pointBackgroundColor:scored.map(o=>o.c),
        pointRadius:5,pointHoverRadius:7,
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      scales:{r:{min:0,max:5,ticks:{stepSize:1,font:{size:9},backdropColor:'transparent'},
        pointLabels:{font:{size:9,family:'Outfit'}},grid:{color:'rgba(0,0,0,.06)'},angleLines:{color:'rgba(0,0,0,.06)'}}},
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${ctx.label}: ${ctx.raw}`}}}
    }
  });
}

function initRanking(avgs,sorted){
  const max=Math.max(...sorted.map(o=>avgs[o.id]),0.01);
  const pc=p=>p==='Sociedad'?'#1a6fab':p==='Biosfera'?'#2d6a1f':'#8a4f00';
  document.getElementById('rankList').innerHTML=sorted.map((o,i)=>`
    <div class="rank-item">
      <span class="rank-pos">${i+1}</span>
      <img class="rank-img" src="${o.img}" alt="ODS ${o.id}">
      <div class="rank-info">
        <div class="rank-name">${o.n}</div>
        <span class="rank-pilar" style="background:${pc(o.p)}18;color:${pc(o.p)}">${o.p}</span>
      </div>
      <div class="rank-right">
        <span class="rank-score" style="color:${avgs[o.id]>0?o.c:'#ccc'}">${avgs[o.id].toFixed(2)}</span>
        <div class="rank-bar-wrap"><div class="rank-bar" style="width:${(avgs[o.id]/max*100).toFixed(0)}%;background:${o.c}"></div></div>
      </div>
    </div>`).join('');
}

function initPilares(rws){
  const data=pilarAvg(rws);
  charts.pilares=new Chart(document.getElementById('cPilares'),{
    type:'bar',
    data:{
      labels:data.map(p=>p.label),
      datasets:[{
        data:data.map(p=>p.avg),
        backgroundColor:data.map(p=>hex2rgba(p.color,.15)),
        borderColor:data.map(p=>p.color),
        borderWidth:2.5,borderRadius:10,borderSkipped:false,
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      scales:{
        y:{min:0,max:5,ticks:{stepSize:1,font:{size:11,family:'Outfit'}},grid:{color:'rgba(0,0,0,.05)'}},
        x:{ticks:{font:{size:12,family:'Outfit',weight:'700'}},grid:{display:false}}
      },
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>' Promedio: '+ctx.raw.toFixed(2)}}}
    }
  });
}

function initPAU(pavgs){
  charts.pau=new Chart(document.getElementById('cPAU'),{
    type:'bar',
    data:{
      labels:PAU.map(p=>p.icon+' '+(p.n.length>30?p.n.slice(0,30)+'…':p.n)),
      datasets:[{
        data:PAU.map(p=>pavgs[p.id]),
        backgroundColor:PAU.map(p=>hex2rgba(p.color,.15)),
        borderColor:PAU.map(p=>p.color),
        borderWidth:2.5,borderRadius:8,borderSkipped:false,
      }]
    },
    options:{
      indexAxis:'y',responsive:true,maintainAspectRatio:false,
      scales:{
        x:{min:0,max:5,ticks:{stepSize:1,font:{size:11,family:'Outfit'}},grid:{color:'rgba(0,0,0,.05)'}},
        y:{ticks:{font:{size:11,family:'Outfit'}},grid:{display:false}}
      },
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>' Promedio: '+ctx.raw.toFixed(2)}}}
    }
  });
}

function initHeatmap(){
  const facs=faculties();
  const facAvgs=Object.fromEntries(facs.map(f=>[f,odsAvg(allRows.filter(r=>(r[cols.facultad]||'').trim()===f))]));
  const tbl=document.getElementById('hmTable'); if(!tbl) return;
  let html=`<thead><tr>
    <th>Facultad</th>
    ${ODS.map(o=>`<th title="ODS ${o.id}: ${o.n}"><img src="${o.img}" style="width:22px;height:22px;border-radius:4px;display:block;margin:0 auto 2px"><span style="font-size:9px;color:var(--muted)">${o.id}</span></th>`).join('')}
  </tr></thead><tbody>`;
  facs.forEach(f=>{
    const cnt=allRows.filter(r=>(r[cols.facultad]||'').trim()===f).length;
    html+=`<tr>
      <td title="${f}">${f} <span style="color:var(--muted);font-weight:400;font-size:10px">(${cnt})</span></td>
      ${ODS.map(o=>{
        const v=facAvgs[f][o.id];
        if(!v) return`<td><div class="hm-cell hm-0" title="Sin datos">–</div></td>`;
        const op=0.1+(v/5)*0.76;
        return`<td><div class="hm-cell" style="background:${hex2rgba(o.c,op)};color:${v>=2.5?o.c:'#888'}" title="ODS ${o.id} · ${f}: ${v.toFixed(2)}">${v.toFixed(1)}</div></td>`;
      }).join('')}
    </tr>`;
  });
  tbl.innerHTML=html+'</tbody>';
}

function initFacComp(facAvgs){
  const globalAvgs=odsAvg(allRows);
  charts.facComp=new Chart(document.getElementById('cFacComp'),{
    type:'bar',
    data:{
      labels:ODS.map(o=>'ODS '+o.id),
      datasets:[
        {label:filterFac,data:ODS.map(o=>facAvgs[o.id]),backgroundColor:ODS.map(o=>hex2rgba(o.c,.6)),borderColor:ODS.map(o=>o.c),borderWidth:1,borderRadius:5},
        {label:'Promedio global',data:ODS.map(o=>globalAvgs[o.id]),type:'line',tension:0.35,borderColor:'#1B3A5C',borderWidth:2.5,backgroundColor:'rgba(27,58,92,.05)',pointBackgroundColor:'#1B3A5C',pointRadius:3,fill:false}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      scales:{
        y:{min:0,max:5,ticks:{stepSize:1,font:{size:10,family:'Outfit'}},grid:{color:'rgba(0,0,0,.05)'}},
        x:{ticks:{font:{size:10,family:'Outfit'}},grid:{display:false}}
      },
      plugins:{
        legend:{position:'bottom',labels:{font:{size:11,family:'Outfit'},padding:18,usePointStyle:true}},
        tooltip:{callbacks:{label:ctx=>' '+ctx.dataset.label+': '+parseFloat(ctx.raw||0).toFixed(2)}}
      }
    }
  });
}

// ═══════════════════════════════════════════
// UI STATES
// ═══════════════════════════════════════════
function showLoading(){
  document.getElementById('dashContent').style.display='none';
  document.getElementById('filterBar').style.display='none';
  const s=document.getElementById('stateScreen');
  s.style.display='flex';
  s.innerHTML='<div class="spinner-lg"></div><div class="state-title">Cargando datos…</div><div class="state-sub">Leyendo el Google Sheet de mapeos ODS.</div>';
}
function showError(msg){
  const s=document.getElementById('stateScreen');
  s.style.display='flex';
  s.innerHTML=`<div style="font-size:48px">⚠️</div><div class="state-title">No se pudieron cargar los datos</div><div class="state-sub">${msg}</div><button class="btn-retry" onclick="loadData()">↺ Reintentar</button>`;
}

loadData();
</script>
</body>
</html>
